client_id = "8c228546203c5dd03577b1b608bd1075"
name = "Delivery Rules Custom"
application_url = "https://moxie-city-rates-test.onrender.com"
embedded = true
handle = "delivery-rules-custom"

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_locations,read_products,read_shipping,write_shipping"

[auth]
redirect_urls = [ "https://moxie-city-rates-test.onrender.com/api/auth" ]


[app_preferences]
url = "https://moxie-city-rates-test.onrender.com/app"
